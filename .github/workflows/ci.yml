name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # No package-lock.json here (the harness uses only Node built-ins), so
      # `npm ci` has nothing to pin against; fall back to `npm install`.
      - run: npm ci || npm install
      - run: node --test tests/*.test.mjs
