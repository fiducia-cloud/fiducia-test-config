# CI: runs the harness self-tests (`node --test`) on push/PR.
name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      # The package intentionally has no third-party dependencies, but the
      # tracked lockfile still makes installation mode deterministic.
      - run: npm ci --ignore-scripts
      - run: node --test tests/*.test.mjs
